{% extends "myapp/base.html" %}
{% block body %}
<div class="max-w-xl mx-auto px-6 py-10">
    <h1 class="text-2xl font-bold text-amber-800 mb-6">Edit Product</h1>
    <form class="bg-white rounded-xl shadow p-8 space-y-5" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <div class="border border-gray-300 rounded-lg px-3 py-2">{{ product_form.name }}</div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <div class="border border-gray-300 rounded-lg px-3 py-2">{{ product_form.description }}</div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Price (USD)</label>
            <div class="border border-gray-300 rounded-lg px-3 py-2">{{ product_form.price }}</div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Product File</label>
            <div class="py-1">{{ product_form.file }}</div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Thumbnail Image</label>
            {% if product.thumbnail %}
                <img class="h-24 rounded-lg mb-2 object-cover" src="{{ product.thumbnail.url }}" alt="Current thumbnail">
            {% endif %}
            <div class="py-1">{{ product_form.thumbnail }}</div>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="flex-1 bg-amber-500 text-white py-2 rounded-full font-semibold hover:bg-amber-600 transition">
                Save Changes
            </button>
            <a href="{% url 'delete' product.id %}"
               class="flex-1 text-center bg-red-500 text-white py-2 rounded-full font-semibold hover:bg-red-600 transition">
                Delete
            </a>
        </div>
    </form>
</div>
{% endblock %}
