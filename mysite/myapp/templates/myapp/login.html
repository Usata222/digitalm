{% extends "myapp/base.html" %}
{% block body %}
<div class="flex flex-col justify-center items-center min-h-screen px-4">
    <h1 class="font-bold text-xl mb-6 text-gray-800">Welcome Back</h1>
    <form class="bg-white shadow-lg rounded-xl p-6 sm:p-10 w-full max-w-sm" method="POST">
        {% csrf_token %}
        {% if form.errors %}
        <div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm">
            Invalid username or password.
        </div>
        {% endif %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <div class="border border-gray-300 rounded-lg px-3 py-2">{{ form.username }}</div>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <div class="border border-gray-300 rounded-lg px-3 py-2">{{ form.password }}</div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit"
                class="w-full bg-green-500 text-white py-2 rounded-full font-semibold hover:bg-green-600 transition">
            Login
        </button>
    </form>
    <p class="mt-4 text-sm text-gray-500">
        Don't have an account?
        <a href="{% url 'register' %}" class="text-green-600 font-medium hover:underline">Sign Up</a>
    </p>
</div>
{% endblock %}
